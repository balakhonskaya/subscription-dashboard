<p>{{ data() }}</p>
<div class="table-wrapper">
  <table mat-table [dataSource]="data().rows" class="customers-table">
    <!-- Handle -->
    <ng-container matColumnDef="handle">
      <th mat-header-cell *matHeaderCellDef>
        <div class="th-with-icon">
          Handle
          <mat-icon class="info-icon">info</mat-icon>
        </div>
      </th>
      <td mat-cell *matCellDef="let row">
        <span class="handle-chip">{{ row.handle }}</span>
      </td>
    </ng-container>

    <!-- Created -->
    <ng-container matColumnDef="created">
      <th mat-header-cell *matHeaderCellDef>Created</th>
      <td mat-cell *matCellDef="let row">
        {{ row.created | date }}
      </td></ng-container
    >

    <!-- Subscription State --><!--
    <ng-container matColumnDef="state">
      <th mat-header-cell *matHeaderCellDef>State</th>
      <td mat-cell *matCellDef="let row">{{ row.subscriptionState }}</td>
    </ng-container>-->

    <!-- Invoice State --><!--
    <ng-container matColumnDef="state">
      <th mat-header-cell *matHeaderCellDef>State</th>
      <td mat-cell *matCellDef="let row">{{ row.invoiceState }}</td>
    </ng-container>-->

    <!-- Amount --><!--
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef>Amount</th>
      <td mat-cell *matCellDef="let row">{{ row.amount }}</td>
    </ng-container>-->

    <!-- Plan handle --><!--
    <ng-container matColumnDef="plan_handle">
      <th mat-header-cell *matHeaderCellDef>Plan Handle</th>
      <td mat-cell *matCellDef="let row">{{ row.subscription_plan_handle }}</td>
    </ng-container>-->

    <!-- Actions --><!--
    <ng-container matColumnDef="plan_handle">
      <th mat-header-cell *matHeaderCellDef>Plan Handle</th>
      <td mat-cell *matCellDef="let row">{{ row.subscripcan_pause }}</td>
    </ng-container>-->

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  @if (!data().rows) {
    <div class="empty-state">No data found</div>
  }
</div>
